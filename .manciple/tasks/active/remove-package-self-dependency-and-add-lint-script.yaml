id: remove-package-self-dependency-and-add-lint-script
title: Remove package self dependency and add lint script
status: needs_review
type: implementation
domain: core
priority: high
depends_on: []
blocks: []
conflicts_with: []
can_run_independently: false
allowed_paths:
  - package.json
  - pnpm-lock.yaml
  - tests/**
  - scripts/**
forbidden_paths:
  - dist/**
  - .manciple/prompts/generated/**
  - .manciple/tasks/completed/**
  - .manciple/tasks/archived/**
path_ownership:
  touched_paths: []
  locked_paths: []
  unsafe_parallel_areas: []
goal: Package metadata no longer declares manciple as its own dependency, and the
  project exposes a runnable lint script for routine local and CI checks.
acceptance_criteria:
  - package.json does not list a dependency, devDependency, optionalDependency, or
    peerDependency named manciple unless the run log documents a concrete packaging
    reason and an alternate non-self dependency design was rejected.
  - pnpm-lock.yaml is updated consistently with any package.json dependency or script
    changes.
  - package.json exposes pnpm run lint as a deterministic local command that succeeds in
    this repo without requiring network access at runtime.
  - prepublishOnly includes the lint check or the run log explains why publishing should
    not be gated on lint for this project stage.
  - Existing package metadata, bin entries, files entries, and release workflow scripts
    continue to work.
implementation_notes:
  - Prefer a lightweight lint script using existing installed tooling if adding a new
    lint dependency would materially expand setup cost; do not add a formatter-style
    lint dependency unless it is justified in the run log.
  - If the self-dependency is intentionally required for packaged asset installation,
    preserve it only with explicit evidence from npm pack or install-asset behavior and
    document the justification in risks/decisions.
  - Do not edit generated dist output by hand.
verification:
  commands:
    - pnpm run lint
    - pnpm typecheck
    - pnpm test
    - pnpm build
outputs_required:
  - files_changed
  - tests_run
  - risks
  - decisions_made
notes:
  - Related completed task package-naming-cleanup touched package metadata, but it
    targeted PromptOps naming references, not dependency hygiene or lint script
    coverage.
