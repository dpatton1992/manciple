name: Packed Global Install Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pack-install-smoke:
    name: npm pack and global install smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run baseline checks
        run: |
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Pack package and install CLI globally
        run: |
          npm pack
          npm install -g ./dpatt-assignr-*.tgz

      - name: Smoke test installed assignr CLI in a temporary project
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          assignr init
          assignr new "Test task"
          assignr validate
          assignr status
          assignr compile test-task
