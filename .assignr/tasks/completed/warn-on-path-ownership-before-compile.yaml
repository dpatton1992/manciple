id: warn-on-path-ownership-before-compile
title: Warn on path ownership before compile
status: complete
type: implementation
domain: core
priority: high
depends_on:
  - add-task-dependency-graph-contract
  - domain-context-injection
  - review-prompt-naming-consistency
  - lifecycle-validate-compile
allowed_paths:
  - src/commands/compile.ts
  - src/mcp.ts
  - src/specs/loadTasks.ts
  - src/utils/paths.ts
  - tests/happyPath.test.ts
  - tests/mcpList.test.ts
forbidden_paths:
  - src/specs/schema.ts
  - src/specs/validateTasks.ts
  - src/commands/review.ts
  - src/templates/renderTemplate.ts
  - README.md
  - .assignr/tasks/
goal: Compiling a task reports actionable warnings when its paths are already touched,
  locked, or unsafe for parallel work.
acceptance_criteria:
  - The CLI compile command inspects active task graph and ownership metadata before
    generating a prompt for a task.
  - Compile output warns when an allowed path is already touched by another active task,
    locked by another task, or under an unsafe parallel-work area.
  - Warnings include the owning task id and the affected path or glob.
  - The MCP compile tool returns the same warning information in its structured result.
  - Prompt generation still succeeds unless the task spec is invalid or missing.
  - Tests cover CLI warning output and MCP compile warning payloads.
verification:
  commands:
    - pnpm test -- happyPath
    - pnpm test -- mcp
    - pnpm typecheck
outputs_required:
  - files_changed
  - tests_run
  - decisions_made
  - risks
  - follow_ups
notes:
  - This task intentionally waits behind existing compile-related review work to avoid
    overlapping edits.
  - Prefer a shared helper for ownership warning calculation if both CLI and MCP need
    the same behavior.
  - Warnings should encourage small safe slices rather than blocking all parallel work.
