id: add-review-outcome-commands
title: Add review outcome commands
status: complete
type: implementation
domain: core
priority: high
depends_on:
  - lifecycle-complete-command
  - lifecycle-reopen-command
  - add-review-decision-checklist-to-generated-prompts
goal: |
  Add CLI commands that record the reviewer decision and move the task to the right lifecycle state. Review should have clear outcomes: approve completed work, request changes by returning the task to active implementation, or block review with a reason.
acceptance_criteria:
  - The `assignr approve <task-id>` command requires the task to be in `needs_review`, records a review outcome, marks the task `complete`, and moves it to `tasks/completed`.
  - The `assignr request-changes <task-id> --reason <text>` command requires the task to be in `needs_review`, records the reason, and updates the active task status to `in_progress`.
  - The `assignr block-review <task-id> --reason <text>` command requires the task to be in `needs_review`, records the reason, and updates the active task status to `blocked`.
  - Each command exits non-zero with a clear error when the task is missing or not in `needs_review`.
  - Review outcome records are written under `.assignr/runs/` or another existing Assignr-owned review/run location without inventing a second hidden state store.
  - CLI help documents all three commands and their required arguments.
  - Tests cover success and failure paths for each command.
allowed_paths:
  - src/commands/approve.ts
  - src/commands/requestChanges.ts
  - src/commands/blockReview.ts
  - src/commands/complete.ts
  - src/commands/setStatus.ts
  - src/commands/runLog.ts
  - src/cli.ts
  - tests/
forbidden_paths:
  - src/specs/schema.ts
  - src/specs/validateTasks.ts
  - bin/
  - dist/
  - .assignr/tasks/
verification:
  commands:
    - pnpm build
    - pnpm test
    - tmpdir="$(mktemp -d)" && cd "$tmpdir" && node /Users/danielpatton/Documents/GitHub/promptops/bin/assignr.js init && node /Users/danielpatton/Documents/GitHub/promptops/bin/assignr.js new "Review outcome test" && node /Users/danielpatton/Documents/GitHub/promptops/bin/assignr.js set-status review-outcome-test needs_review && node /Users/danielpatton/Documents/GitHub/promptops/bin/assignr.js approve review-outcome-test && test -f .assignr/tasks/completed/review-outcome-test.yaml
outputs_required:
  - files_changed
  - risks
notes:
  - Keep command behavior aligned with MCP status transitions if MCP support is added later.
  - Do not require review prompts to exist before allowing an outcome; missing prompts should be a warning or future validation concern, not a hard dependency here.
