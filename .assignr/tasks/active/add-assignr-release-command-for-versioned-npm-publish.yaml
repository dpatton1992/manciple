id: add-assignr-release-command-for-versioned-npm-publish
title: Add assignr release command for versioned npm publish
status: needs_review
type: hardening
domain: core
priority: high
depends_on: []
blocks: []
conflicts_with: []
can_run_independently: false
allowed_paths:
  - scripts/release.ts
  - package.json
forbidden_paths:
  - tests/**
  - dist/**
  - bin/**
  - .assignr/**
  - src/**
path_ownership:
  touched_paths: []
  locked_paths: []
  unsafe_parallel_areas: []
goal: A pnpm release script that bumps the version, publishes to npm, creates a git tag,
  and creates a GitHub release with generated release notes.
implementation_notes:
  - Create scripts/release.ts with a main() function (not a module export).
  - "The script should accept: bump type ('patch'|'minor'|'major') as a positional arg,
    plus --otp <code>, --dry-run, and --preview flags."
  - Read the current version from package.json using JSON.parse(readFileSync).
  - For version bumping, modify package.json directly with writeFileSync rather than
    shelling out to npm version.
  - Generate release notes by running git log --oneline --no-decorate <last-tag>..HEAD
    and formatting into markdown. Find the last tag with git describe --tags --abbrev=0
    or similar.
  - "The step order should be: (1) preview/dry-run guard, (2) typecheck+test+build, (3)
    bump version, (4) rebuild, (5) npm publish, (6) create git tag, (7) push tag, (8)
    create GitHub release."
  - If --dry-run is set, print all planned steps without executing them.
  - Do not commit the version bump — only create a tag.
  - The package.json "release" script should call tsx scripts/release.ts.
  - This is NOT an assignr CLI command — it's a package.json script only.
acceptance_criteria:
  - pnpm release patch prints dry-run steps for bumping x.y.z to x.y.z+1.
  - pnpm release minor prints dry-run steps for bumping x.y.z to x.y+1.0.
  - pnpm release major prints dry-run steps for bumping x.y.z to x+1.0.0.
  - pnpm release --dry-run patch prints all pipeline steps without executing them.
  - pnpm release --preview patch prints generated release notes from git log.
  - pnpm release --otp <code> includes --otp in the npm publish command shown during
    dry-run.
  - scripts/release.ts exists.
  - package.json has a "release" script entry calling tsx scripts/release.ts.
  - pnpm typecheck, pnpm test, and pnpm build all pass.
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - pnpm release --dry-run patch 2>&1 | head -5
    - test -f scripts/release.ts
outputs_required:
  - files_changed
  - tests_run
  - risks
notes:
  - This task was originally scoped as a CLI command, but was changed to a package
    script per user direction.
  - A stale src/commands/release.ts from the initial (reverted) implementation may exist
    — it's dead code and will be cleaned up.
  - Use --dry-run for verification instead of actually publishing.
