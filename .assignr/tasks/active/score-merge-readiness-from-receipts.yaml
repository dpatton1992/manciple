id: score-merge-readiness-from-receipts
title: Score merge readiness from receipts
status: pending
type: implementation
domain: core
priority: high
depends_on:
  - add-task-dependency-graph-contract
  - add-review-evidence-validation
allowed_paths:
  - src/commands/runLog.ts
  - src/commands/reviewCheck.ts
  - src/review/
  - tests/runLog.test.ts
  - tests/reviewReadiness.test.ts
  - tests/reviewCheck.test.ts
forbidden_paths:
  - src/specs/schema.ts
  - src/specs/validateTasks.ts
  - src/commands/compile.ts
  - src/templates/renderTemplate.ts
  - src/cli.ts
  - README.md
  - .assignr/tasks/
goal: Review readiness reports a merge-readiness score based on tests, overlap, receipts, acceptance coverage, risks, and human-review needs.
acceptance_criteria:
  - Run logs expose first-class receipt fields for files changed, tests run, decisions made, risks, and follow-ups.
  - Review readiness distinguishes missing receipt fields from failed tests or documented risks.
  - A merge-readiness score or checklist is computed for needs_review tasks using receipt evidence, git changed files, path overlap, acceptance criteria evidence, and documented risks.
  - The readiness output identifies whether human review is needed and why.
  - Tests cover complete receipts, missing receipts, overlapping files, uncovered acceptance criteria, documented risks, and failing or absent tests.
verification:
  commands:
    - pnpm test -- runLog
    - pnpm test -- reviewReadiness
    - pnpm test -- reviewCheck
    - pnpm typecheck
outputs_required:
  - files_changed
  - tests_run
  - decisions_made
  - risks
  - follow_ups
notes:
  - This task extends the existing evidence/readiness work rather than replacing it.
  - Do not mark tasks as done automatically; report readiness and reasons.
  - The score should make small mergeable slices easy to recognize.
