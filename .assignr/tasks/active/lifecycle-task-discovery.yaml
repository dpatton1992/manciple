id: lifecycle-task-discovery
title: Update paths and task loading for active/completed/archived directories
status: needs_review
type: implementation
domain: core
priority: critical
depends_on: []
goal: >
  Tasks currently live in a flat directory at `.assignr/specs/tasks`. This task
  introduces a tiered directory structure: `.assignr/tasks/active`,
  `.assignr/tasks/completed`, and `.assignr/tasks/archived`. It updates `paths.ts` to
  expose the three new path constants and updates `loadTasks.ts` to accept a `tier`
  parameter so callers can load tasks from one tier, several tiers, or all tiers. This
  is the foundation everything else in the lifecycle feature depends on.
acceptance_criteria:
  - "paths.ts exports three new fields on AssignrPaths: tasksActive, tasksCompleted,
    tasksArchived, each resolving to <root>/tasks/<tier>"
  - "loadTasks accepts a second parameter: tier ('active' | 'completed' | 'archived' |
    'all'), defaulting to 'active'"
  - When tier is 'active', loadTasks reads only from tasksActive
  - When tier is 'all', loadTasks reads from all three directories and merges the results
  - "Each LoadedTask in the result carries the tier it was loaded from, accessible as a
    new field (e.g. tier: string) so callers can display or filter by tier"
  - If a directory does not exist, loadTasks skips it without error (same behaviour as
    the current empty-dir handling)
  - The original specsTasks path remains in paths.ts for now to preserve backward
    compatibility; do not remove it in this task
  - All existing tests continue to pass
allowed_paths:
  - src/utils/paths.ts
  - src/specs/loadTasks.ts
  - tests/
forbidden_paths:
  - src/commands/
  - src/specs/schema.ts
  - src/specs/validateTasks.ts
  - bin/
verification:
  commands:
    - pnpm build
    - pnpm test
outputs_required:
  - files_changed
  - risks
notes:
  - The new top-level tasks dir is <root>/tasks (e.g. .assignr/tasks), which is distinct
    from the existing <root>/specs/tasks; do not confuse them
  - LoadedTask is defined in schema.ts; add the tier field there or extend it in
    loadTasks.ts using an intersection type — avoid touching the Zod schema itself
  - The tier parameter should be a union type, not a raw string, so callers get type
    safety
  - All three directories may be absent at first (fresh repos); this must not crash
  - Add or update tests in tests/ to cover multi-tier loading and the tier field on
    results
