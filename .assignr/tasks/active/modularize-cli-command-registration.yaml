id: modularize-cli-command-registration
title: Modularize CLI command registration
status: pending
type: refactor
domain: core
priority: medium
depends_on:
  - introduce-testable-command-error-handling-for-task-creation
blocks: []
conflicts_with: []
can_run_independently: false
allowed_paths:
  - src/cli.ts
  - src/commands/task.ts
  - src/commands/submit.ts
  - src/commands/check.ts
  - src/commands/handoff.ts
  - src/commands/review.ts
  - src/commands/**/*.ts
  - tests/cliWorkflow.test.ts
  - tests/happyPath.test.ts
  - tests/reviewOutcomeCommands.test.ts
forbidden_paths:
  - dist/**
  - .assignr/prompts/generated/**
  - .assignr/tasks/completed/**
  - .assignr/tasks/archived/**
path_ownership:
  touched_paths: []
  locked_paths: []
  unsafe_parallel_areas: []
goal: src/cli.ts is reduced to an entrypoint that delegates command group registration
  to focused modules without changing public CLI behavior.
acceptance_criteria:
  - src/cli.ts delegates at least task, submit, review, check, and legacy command
    registration to focused registration modules or existing command group modules.
  - assignr --help, assignr --help --all, legacy deprecation hints, primary command
    hiding, and existing command aliases continue to behave as covered by tests.
  - Shared CLI helpers such as collect, parseNumberOption, deprecation handling, and
    path/config context are either kept in src/cli.ts when truly entrypoint-specific or
    moved to focused modules with clear ownership.
  - No command behavior, option names, defaults, or output text changes except
    incidental stack traces should occur without explicit test updates and run-log
    explanation.
  - The resulting source layout makes src/cli.ts materially smaller or simpler, with a
    short decision note in the run log describing the new registration boundaries.
implementation_notes:
  - Treat this as a behavior-preserving refactor; do not add new CLI features in this
    task.
  - Use existing registerTaskCommands and registerSubmitCommand patterns as the
    preferred style where they fit.
  - Keep public legacy command compatibility intact. Deprecated commands should still
    emit the same replacement hints once per process.
  - If this exposes additional direct process.exit sites at the Commander boundary, keep
    them at the boundary and do not migrate command modules beyond what the dependency
    task already changed.
verification:
  commands:
    - pnpm typecheck
    - pnpm test -- cliWorkflow happyPath reviewOutcomeCommands
outputs_required:
  - files_changed
  - tests_run
  - risks
  - decisions_made
notes:
  - Allowed paths include src/commands/**/*.ts because registration helpers may live
    beside command groups; avoid unrelated behavior changes inside individual command
    implementations.
