id: add-planner-context-budget-and-task-index
title: Add planner context budget and task index
status: needs_review
type: implementation
domain: core
priority: critical
depends_on: []
blocks: []
conflicts_with: []
can_run_independently: false
allowed_paths:
  - src/cli.ts
  - src/commands/list.ts
  - src/commands/plannerContext.ts
  - src/specs/loadTasks.ts
  - src/utils/
  - tests/list.test.ts
  - tests/loadTasks.test.ts
  - tests/plannerContext.test.ts
forbidden_paths:
  - src/coordination/
  - src/commands/coordinator.ts
  - src/commands/reviewQueue.ts
  - src/commands/review.ts
  - src/commands/runLog.ts
