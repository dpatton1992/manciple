id: align-docs-with-current-cli-commands-handoff-not-compile
title: Align docs with current CLI commands (handoff not compile)
status: needs_review
type: docs
domain: core
priority: high
depends_on:
  - rename-npm-package-from-dpattassignr-to-assignr
blocks: []
conflicts_with: []
can_run_independently: false
allowed_paths:
  - README.md
  - docs/getting-started.md
  - .assignr/commands/README.md
  - src/commands/init.ts
forbidden_paths:
  - src/**
  - tests/**
  - bin/**
  - dist/**
path_ownership:
  touched_paths: []
  locked_paths: []
  unsafe_parallel_areas: []
goal: All documentation uses assignr handoff (the current CLI command) instead of the
  deprecated assignr compile, and the README embeds the init output screenshot inline.
acceptance_criteria:
  - README.md quickstart shows assignr handoff build-login-page instead of assignr
    compile build-login-page.
  - README.md command reference table shows handoff instead of compile as the primary
    command.
  - docs/getting-started.md uses assignr handoff throughout.
  - docs/getting-started.md section heading reads 'Create And Handoff A Task' (not
    'Create And Compile A Task').
  - .assignr/commands/README.md workflow block uses assignr handoff.
  - No documentation references assignr compile as a primary/recommended command
    (compile may still be mentioned as a deprecated alias).
  - README.md includes an embedded screenshot of the assignr init output (the human must
    provide ./docs/images/init-output.png before this task runs).
  - pnpm typecheck passes.
implementation_notes:
  - "The init output screenshot must be captured by a human before this task runs: run
    assignr init in a fresh test repo and screenshot the output. Save to
    docs/images/init-output.png."
  - The compile command still exists as a deprecated alias for handoff — it's fine to
    mention it in a deprecation note, but it should not appear as the primary command
    anywhere.
  - The demo section of the README (lines 12-41) also uses assignr compile in the
    'after' example.
  - The getting-started.md heading on line 38 says 'Create And Compile A Task' — change
    to 'Create And Handoff A Task'.
  - .assignr/commands/README.md is generated by init and shows the workflow — needs
    updating in the source (src/commands/init.ts COMMANDS_README) AND the live file.
  - .assignr/commands/README.md is regenerated each time init runs — fix the template in
    src/commands/init.ts so future init runs produce correct output.
verification:
  commands:
    - pnpm typecheck
    - rg -n 'assignr compile' README.md | wc -l | xargs test 0 -eq
    - rg -n 'assignr compile' docs/getting-started.md | wc -l | xargs test 0 -eq
    - rg -n 'assignr compile' .assignr/commands/README.md | wc -l | xargs test 0 -eq
    - rg -n 'assignr compile' src/commands/init.ts .assignr/commands/README.md; test $?
      -eq 1
outputs_required:
  - files_changed
  - tests_run
  - risks
notes:
  - Depends on the package rename task because both touch README.md — running them
    sequentially avoids merge conflicts.
  - The init output screenshot (image 3 referenced by the user) is a manual step a human
    must perform before this task runs; no automation can capture terminal output as a
    screenshot.
  - The existing blocked task readme-thirty-second-value-demo also touches README.md but
    adds a before/after value demo — coordinate with that task's eventual scope to avoid
    conflicting edits.
