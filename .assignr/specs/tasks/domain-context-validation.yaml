id: domain-context-validation
title: Validate domain references during assignr validate
status: pending
type: implementation
domain: core
priority: medium
depends_on:
  - dep-validation-missing-refs

goal: >
  Task specs reference a domain by name (e.g. `domain: core`) but `assignr
  validate` does not check whether a corresponding domain file exists at
  `.assignr/specs/domains/<domain>.yaml`. This task adds that check so
  typos and stale domain references are caught early rather than silently
  producing a compiled prompt with no domain context.

acceptance_criteria:
  - Running `assignr validate` when a task's `domain` has no matching file under `.assignr/specs/domains` exits non-zero and prints an error naming the task id and the unresolved domain value
  - Tasks whose domain resolves to a real file pass without error
  - All errors across all specs are reported before exiting (same collect-all pattern as missing-ref validation)
  - The check is ordered after schema validation and missing-ref validation

allowed_paths:
  - src/specs/validateTasks.ts
  - src/commands/validate.ts

forbidden_paths:
  - src/specs/schema.ts
  - src/commands/list.ts
  - src/commands/compile.ts
  - bin/

verification:
  commands:
    - pnpm build
    - pnpm test
    - "node bin/assignr.js validate"

outputs_required:
  - files_changed
  - risks

notes:
  - Use fs.existsSync to check for the domain file; no need to parse it
    during validation
  - The domains directory path should come from the paths utility
    (src/utils/paths.ts) rather than being hardcoded
  - This check should be a separate function in validateTasks.ts alongside
    the missing-ref check, not folded into it
