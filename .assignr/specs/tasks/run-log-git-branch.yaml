id: run-log-git-branch
title: Auto-detect current git branch in run log stubs
status: complete
type: implementation
domain: core
priority: low
depends_on: []

goal: >
  The run log stub generated by `promptops run-log` includes "Branch: TODO".
  The command should auto-detect the current git branch using
  `git rev-parse --abbrev-ref HEAD` via spawnSync and populate the field.
  If git is unavailable or the directory is not a git repo, fall back to
  the string "unknown" without crashing.

acceptance_criteria:
  - The Branch field in a generated run log contains the actual branch name
    when run inside a git repo
  - Falls back to "unknown" gracefully when git is unavailable or returns
    a non-zero exit code
  - No new runtime dependency is introduced (use Node built-in child_process)

allowed_paths:
  - src/commands/runLog.ts

forbidden_paths:
  - src/commands/**
  - tests/**

verification:
  commands:
    - pnpm build
    - pnpm typecheck

outputs_required:
  - files_changed
  - risks

notes:
  - Use spawnSync (already used in bin/promptops.js) to keep it synchronous
  - Trim the stdout result before using it; git output often has a trailing newline
