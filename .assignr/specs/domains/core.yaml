id: core
title: Assignr Core
description: >
  The assignr CLI itself. Covers src/, bin/, tests/, and build/publish
  configuration. All commands live under src/commands/. Shared utilities are
  in src/utils/ and src/specs/. The compiled output goes to dist/.

key_files:
  - src/cli.ts              # Commander entry point, all command wiring
  - src/constants.ts        # Enums: STATUSES, TASK_TYPES, PRIORITIES
  - src/config.ts           # Reads .assignr/config.yaml
  - src/commands/           # One file per CLI command
  - src/specs/schema.ts     # Zod schema for TaskSpec
  - src/utils/paths.ts      # All path resolution
  - bin/assignr.js          # Published entry shim (dist vs. tsx fallback)
  - package.json            # Package metadata, scripts

conventions:
  - All source is ESM TypeScript compiled to dist/ via tsc
  - Tests live in tests/ and use vitest
  - Commands print to stdout; errors to stderr + process.exit(1)
  - No external runtime beyond the four declared dependencies

verification_baseline:
  - pnpm typecheck
  - pnpm test
  - pnpm build

product_contracts:
  review_queue_modes:
    status: planned
    purpose: >
      Control review spend for batches of needs_review tasks while preserving
      durable evidence, repeatability, auditability, resumability, and safety.
      Cheap review queue mode is spend control with escalation, not a claim that
      Assignr is cheaper than a direct single prompt.
    triage_mode:
      inputs:
        - task status
        - task spec, including allowed_paths, forbidden_paths, acceptance_criteria, verification.commands, and outputs_required
        - latest run-log evidence, including files_changed, tests_run or commands_run, decisions_made, risks, and acceptance evidence
        - files changed from the run log or git status
        - recorded verification commands and results
        - obvious scope violations, including files outside allowed_paths or inside forbidden_paths
      outputs:
        - task id and triage decision
        - review-check readiness score and missing-evidence summary
        - changed-file source and scope warning summary
        - verification status, including missing, failed, or unrecorded commands
        - documented risk summary
        - recommended next action: approve-ready, deep-review, request-changes, or blocked
        - durable queue receipt that can be resumed or audited later
    deep_mode:
      escalation_criteria:
        - missing run-log evidence or missing required output fields
        - failed verification, unrecorded verification results, or verification commands absent from the run log
        - changed files outside allowed_paths or touching forbidden_paths
        - documented residual risks
        - path conflicts or rework-needed placement from the coordinator queue
        - incomplete acceptance criteria evidence
      output: >
        A review recommendation that cites the task spec, run log, diff,
        acceptance criteria, verification evidence, risks, and generated review
        prompt rather than relying on the triage receipt alone.
    existing_command_boundaries:
      review_check: >
        review-check remains the owner of readiness scoring and evidence
        checklist semantics. Review queue mode consumes its score and reasons.
      coordinator: >
        coordinator remains the owner of queue grouping, dependency usability,
        and path-conflict placement. Review queue mode consumes those placements
        when deciding whether triage can stop or deep review is required.
    cli_examples:
      triage_only: assignr review-queue --mode triage
      deep_only: assignr review-queue --mode deep build-login-page
      triage_then_escalate: assignr review-queue --mode triage --escalate deep
